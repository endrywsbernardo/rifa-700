<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#0b0c10; --surface:#13141a; --card:#1c1d26; --border:#2a2b38;
      --accent:#f5c518; --text:#e8e9f0; --muted:#6b6e85;
      --danger:#ff4d6d; --winner:#ff9f1c; --radius:10px; --tr:0.18s ease;
    }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }

    /* ── LOGIN ── */
    #login-screen {
      display:flex; align-items:center; justify-content:center;
      min-height:100vh; padding:20px;
    }
    .login-box {
      background:var(--card); border:1px solid var(--border);
      border-radius:16px; padding:36px; width:min(400px,100%);
    }
    .login-box h1 { font-family:'Bebas Neue',sans-serif; font-size:2.4rem; color:#fff; letter-spacing:.05em; margin-bottom:6px; }
    .login-box h1 span { color:var(--accent); }
    .login-box p { color:var(--muted); font-size:.88rem; margin-bottom:24px; }
    .login-box label { display:block; font-size:.78rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:6px; }
    .login-box input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-family:'DM Sans',sans-serif; font-size:1rem; padding:12px 14px; outline:none; transition:var(--tr); margin-bottom:16px; }
    .login-box input:focus { border-color:var(--accent); }

    /* ── PAINEL ── */
    #panel-screen { display:none; padding:32px 20px 60px; max-width:720px; margin:0 auto; }

    .panel-header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:20px; }
    .panel-header h1 { font-family:'Bebas Neue',sans-serif; font-size:2rem; color:#fff; letter-spacing:.05em; }
    .panel-header h1 span { color:var(--accent); }

    .panel-stats { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; }
    .pstat { background:var(--card); border:1px solid var(--border); border-radius:999px; padding:7px 16px; font-size:.82rem; font-weight:500; display:flex; align-items:center; gap:6px; }
    .pstat strong { color:#fff; }
    .dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
    .dot-t { background:var(--accent); } .dot-a { background:var(--muted); }

    .panel-actions { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }

    /* ── BOTÕES ── */
    .btn { display:inline-flex; align-items:center; gap:7px; font-family:'DM Sans',sans-serif; font-size:.85rem; font-weight:600; border:none; border-radius:var(--radius); padding:10px 20px; cursor:pointer; transition:var(--tr); }
    .btn-accent { background:var(--accent); color:#0b0c10; width:100%; justify-content:center; }
    .btn-accent:hover { background:#ffd740; }
    .btn-ghost { background:var(--card); color:var(--muted); border:1px solid var(--border); }
    .btn-ghost:hover { color:var(--text); border-color:var(--muted); }
    .btn-danger { background:rgba(255,77,109,.12); color:var(--danger); border:1px solid rgba(255,77,109,.3); }
    .btn-danger:hover { background:rgba(255,77,109,.22); }
    .btn-winner { background:rgba(255,159,28,.15); color:var(--winner); border:1px solid rgba(255,159,28,.35); }
    .btn-winner:hover { background:rgba(255,159,28,.28); }

    /* ── LISTA ── */
    .contact-list { display:flex; flex-direction:column; gap:6px; margin-bottom:20px; }
    .contact-item { display:flex; align-items:center; gap:12px; padding:10px 14px; border-radius:8px; background:var(--surface); border:1px solid var(--border); transition:opacity .2s; }
    .contact-num { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; color:var(--accent); min-width:58px; letter-spacing:.04em; }
    .contact-info { flex:1; }
    .contact-info .cname { font-weight:600; color:var(--text); font-size:.9rem; }
    .contact-info .cphone { color:var(--muted); font-size:.8rem; margin-top:2px; }
    .btn-del { background:none; border:none; cursor:pointer; color:var(--muted); font-size:1rem; padding:6px 8px; border-radius:6px; transition:var(--tr); flex-shrink:0; }
    .btn-del:hover { background:rgba(255,77,109,.15); color:var(--danger); }
    .empty-msg { color:var(--muted); text-align:center; padding:40px 20px; font-size:.9rem; background:var(--surface); border:1px solid var(--border); border-radius:8px; }

    /* ── MODAL SORTEIO ── */
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,.75); display:flex; align-items:center; justify-content:center; z-index:100; backdrop-filter:blur(4px); opacity:0; pointer-events:none; transition:opacity .2s; }
    .overlay.open { opacity:1; pointer-events:all; }
    .modal { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:32px; width:min(440px,92vw); transform:translateY(20px); transition:transform .2s; }
    .overlay.open .modal { transform:translateY(0); }
    .modal h2 { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:.05em; color:#fff; margin-bottom:6px; }
    .modal h2 span { color:var(--winner); }
    .modal .desc { color:var(--muted); font-size:.88rem; margin-bottom:20px; }
    .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; flex-wrap:wrap; }
    .draw-box { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:28px; text-align:center; margin-bottom:8px; }
    .draw-number { font-family:'Bebas Neue',sans-serif; font-size:5.5rem; letter-spacing:.04em; color:var(--winner); line-height:1; }
    .draw-name { font-size:1.2rem; font-weight:600; color:#fff; margin-top:10px; }
    .draw-phone { font-size:.95rem; color:var(--muted); margin-top:4px; }
    .draw-roll { font-family:'Bebas Neue',sans-serif; font-size:4rem; color:var(--muted); letter-spacing:.04em; }

    /* ── SPINNER / TOAST ── */
    .spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(0,0,0,.2); border-top-color:#0b0c10; border-radius:50%; animation:spin .6s linear infinite; vertical-align:middle; margin-right:6px; }
    .spinner-w { border:2px solid rgba(255,255,255,.2); border-top-color:#fff; }
    @keyframes spin { to{transform:rotate(360deg)} }
    #toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--card); border:1px solid var(--border); border-radius:999px; padding:12px 24px; font-size:.88rem; font-weight:500; color:var(--text); z-index:200; transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s; opacity:0; white-space:nowrap; pointer-events:none; }
    #toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
  </style>
</head>
<body>

<!-- ══ TELA DE LOGIN ══ -->
<div id="login-screen">
  <div class="login-box">
    <h1>Admin <span>Rifa</span></h1>
    <p>Área restrita — somente administradores.</p>
    <label>Senha</label>
    <input type="password" id="admin-pw" placeholder="••••••••" />
    <button class="btn btn-accent" id="btn-login" onclick="adminLogin()">Entrar →</button>
  </div>
</div>

<!-- ══ PAINEL ADMIN ══ -->
<div id="panel-screen">

  <div class="panel-header">
    <h1>📋 Lista de <span>Compradores</span></h1>
  </div>

  <div class="panel-stats">
    <div class="pstat"><span class="dot dot-t"></span>Comprados: <strong id="ps-taken">—</strong></div>
    <div class="pstat"><span class="dot dot-a"></span>Disponíveis: <strong id="ps-avail">—</strong></div>
  </div>

  <div class="panel-actions">
    <button class="btn btn-winner" onclick="openDraw()">🎰 Sortear</button>
    <button class="btn btn-ghost"  onclick="exportCSV()">⬇️ Exportar CSV</button>
    <button class="btn btn-danger" onclick="clearAll()">🗑️ Limpar Tudo</button>
    <button class="btn btn-ghost"  onclick="logout()">Sair</button>
  </div>

  <div class="contact-list" id="contact-list">
    <div class="empty-msg">Carregando...</div>
  </div>

  <div style="text-align:center">
    <a href="index.html" style="color:var(--muted);font-size:.8rem;text-decoration:none">← Voltar ao site da rifa</a>
  </div>

</div>

<!-- ══ MODAL: Sorteio ══ -->
<div class="overlay" id="modal-draw">
  <div class="modal">
    <h2>🎰 <span>Sorteio</span></h2>
    <p class="desc">Pressione "Sortear" para escolher um vencedor aleatório entre os números comprados.</p>
    <div class="draw-box" id="draw-box">
      <div style="color:var(--muted);font-size:.9rem">Pronto para sortear...</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost"  onclick="closeModal('modal-draw')">Fechar</button>
      <button class="btn btn-winner" onclick="runDraw()">🎲 Sortear</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp }        from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, onSnapshot,
         doc, deleteDoc, getDocs, writeBatch } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

/* ══════════════════════════════════════════════
   SENHA — hash SHA-256
   Para trocar: https://emn178.github.io/online-tools/sha256.html
   Cole o novo hash abaixo.
   Hash atual = "alanalinda@123"
══════════════════════════════════════════════ */
const ADMIN_HASH = '4b2ee1d59bac7358cd71073fb24b1860f0c4c3de2f37c595e9101b8eefb5812e';
const TOTAL = 700;

const firebaseConfig = {
  apiKey:            "AIzaSyAR0uZezZUxH8Ch7mdUZBywgPRoE_vMhl4",
  authDomain:        "rifa-info2.firebaseapp.com",
  projectId:         "rifa-info2",
  storageBucket:     "rifa-info2.firebasestorage.app",
  messagingSenderId: "331551606137",
  appId:             "1:331551606137:web:08f5abcc65c684111ddba8"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const col = collection(db, 'numbers');

let raffleData = {};
let unsubscribe = null;

/* ── SHA-256 ── */
async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

/* ── Login ── */
async function adminLogin() {
  const pw = document.getElementById('admin-pw').value;
  if (!pw) return;
  setBtnLoading('btn-login', true, 'Verificando...');
  const hash = await sha256(pw);
  if (hash !== ADMIN_HASH) {
    setBtnLoading('btn-login', false, 'Entrar →');
    showToast('❌ Senha incorreta!');
    return;
  }
  sessionStorage.setItem('rifa_admin', '1');
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('panel-screen').style.display = 'block';
  startListening();
}

function logout() {
  sessionStorage.removeItem('rifa_admin');
  if (unsubscribe) unsubscribe();
  raffleData = {};
  document.getElementById('panel-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-pw').value = '';
  showToast('👋 Sessão encerrada.');
}

/* ── Firestore tempo real ── */
function startListening() {
  unsubscribe = onSnapshot(col, snap => {
    raffleData = {};
    snap.forEach(d => { raffleData[d.id] = d.data(); });
    renderList();
  });
}

/* ── Renderiza lista ── */
function renderList() {
  const entries = Object.entries(raffleData).sort(([a],[b]) => +a - +b);
  document.getElementById('ps-taken').textContent = entries.length;
  document.getElementById('ps-avail').textContent = TOTAL - entries.length;
  const list = document.getElementById('contact-list');
  list.innerHTML = entries.length
    ? entries.map(([k,v]) => `
        <div class="contact-item" id="ci-${k}">
          <div class="contact-num">${pad(+k)}</div>
          <div class="contact-info">
            <div class="cname">${v.owner}</div>
            <div class="cphone">📱 ${v.phone||'—'} &nbsp;·&nbsp; ${v.ts ? new Date(v.ts).toLocaleString('pt-BR') : '—'}</div>
            <div class="cphone">🛒 Vendedor: ${v.seller||'—'}</div>
          </div>
          <button class="btn-del" title="Liberar número" onclick="window._del(${k})">🗑️</button>
        </div>`).join('')
    : `<div class="empty-msg">Nenhum número vendido ainda.</div>`;
}

/* ── Deletar um número ── */
window._del = async function(num) {
  const e = raffleData[num];
  if (!confirm(`Liberar #${pad(+num)} — ${e?.owner}?\nUm CSV de backup será salvo automaticamente.`)) return;
  autoBackup(`backup_del_${pad(+num)}`);
  const el = document.getElementById(`ci-${num}`);
  if (el) { el.style.opacity='0.3'; el.style.pointerEvents='none'; }
  try {
    await deleteDoc(doc(db, 'numbers', String(num)));
    showToast(`✅ Número ${pad(+num)} liberado! Backup salvo.`);
  } catch(err) {
    showToast('❌ Erro ao deletar.');
    if (el) { el.style.opacity=''; el.style.pointerEvents=''; }
  }
};

/* ── Limpar tudo ── */
async function clearAll() {
  if (!confirm('Apagar TODOS os dados?\nUm CSV de backup será salvo automaticamente antes.')) return;
  autoBackup('backup_limpar_tudo');
  try {
    const snap = await getDocs(col);
    const batch = writeBatch(db);
    snap.forEach(d => batch.delete(d.ref));
    await batch.commit();
    showToast('🗑️ Tudo limpo! Backup salvo.');
  } catch(e) { showToast('❌ Erro ao limpar.'); }
}

/* ── Backup automático CSV ── */
function autoBackup(filename) {
  const entries = Object.entries(raffleData).sort(([a],[b]) => +a - +b);
  if (!entries.length) return;
  const rows = [['Número','Nome','Telefone','Vendedor','Data/Hora']];
  entries.forEach(([k,v]) => rows.push([pad(+k), v.owner, v.phone||'', v.seller||'', v.ts ? new Date(v.ts).toLocaleString('pt-BR') : '']));
  const csv = rows.map(r => r.map(c=>`"${c}"`).join(',')).join('\n');
  const date = new Date().toISOString().slice(0,16).replace('T','_').replace(':','-');
  Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'})),
    download: `${filename}_${date}.csv`
  }).click();
}

/* ── Exportar CSV manual ── */
function exportCSV() {
  const entries = Object.entries(raffleData).sort(([a],[b]) => +a - +b);
  if (!entries.length) { showToast('Nenhum dado para exportar.'); return; }
  autoBackup('rifa_compradores');
  showToast('✅ CSV exportado!');
}

/* ══════════════════════════════════════════════
   SORTEIO
══════════════════════════════════════════════ */
function openDraw() {
  document.getElementById('draw-box').innerHTML = `<div style="color:var(--muted);font-size:.9rem">Pronto para sortear...</div>`;
  openModal('modal-draw');
}

function runDraw() {
  const sold = Object.keys(raffleData).map(Number);
  if (!sold.length) { showToast('⚠️ Nenhum número comprado ainda!'); return; }
  const box = document.getElementById('draw-box');
  let ticks = 0, speed = 60;
  function tick() {
    ticks++;
    const fake = sold[Math.floor(Math.random() * sold.length)];
    box.innerHTML = `<div class="draw-roll">${pad(fake)}</div>`;
    if (ticks < 20) speed = 60;
    else if (ticks < 30) speed = 110;
    else if (ticks < 36) speed = 180;
    if (ticks < 36) { setTimeout(tick, speed); return; }
    // Resultado final
    const winner = sold[Math.floor(Math.random() * sold.length)];
    const e = raffleData[winner];
    box.innerHTML = `
      <div style="font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">🏆 Vencedor</div>
      <div class="draw-number">${pad(winner)}</div>
      <div class="draw-name">${e.owner}</div>
      <div class="draw-phone">📱 ${e.phone||'—'}</div>`;
    showToast(`🏆 Vencedor: ${pad(winner)} — ${e.owner}`);
  }
  tick();
}

/* ── Helpers ── */
const pad = n => String(n).padStart(3,'0');
const openModal  = id => document.getElementById(id).classList.add('open');
const closeModal = id => document.getElementById(id).classList.remove('open');

document.querySelectorAll('.overlay').forEach(o =>
  o.addEventListener('click', e => { if (e.target === o) closeModal(o.id); }));

document.getElementById('admin-pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') adminLogin();
});

function setBtnLoading(id, on, label) {
  const b = document.getElementById(id);
  b.disabled = on;
  b.innerHTML = on ? `<span class="spinner spinner-w"></span>${label}` : label;
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

// Expõe funções globais
window.adminLogin = adminLogin;
window.logout     = logout;
window.clearAll   = clearAll;
window.exportCSV  = exportCSV;
window.openDraw   = openDraw;
window.runDraw    = runDraw;
window.closeModal = closeModal;

// Se já estava logado nessa aba
if (sessionStorage.getItem('rifa_admin')) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('panel-screen').style.display = 'block';
  startListening();
}
</script>
</body>
</html>
